<!-- ============================================================
     安全信息（仅供开发调试用，生产环境应移除）
     默认管理员账号: admin / 密码哈希已存储（非明文）
     修复说明：v2.0 已增加 CSRF Token、速率限制、账号锁定
     ============================================================ -->
{% extends "base.html" %}
{% block content %}
<div class="card login-card">
    <h2>用户登录</h2>
    <form method="post" action="/login" class="login-form">
        <!-- CSRF 防护令牌（防止跨站请求伪造） -->
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" required>
        </div>
        {% if error %}
            <p class="error-message">{{ error }}</p>
        {% endif %}
        {% if message %}
            <p class="success-message">{{ message }}</p>
        {% endif %}
        <button type="submit" class="btn btn-primary btn-block">登录</button>
    </form>
</div>
{% endblock %}
