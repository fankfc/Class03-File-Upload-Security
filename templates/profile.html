{% extends "base.html" %}
{% block content %}
{% if user %}
    <div class="card profile-card">
        <h2>个人中心</h2>
        <div class="profile-info">
            <h3>用户资料</h3>
            <ul class="info-list">
                <li><span class="info-label">ID：</span>{{ user.id }}</li>
                <li><span class="info-label">用户名：</span>{{ user.username }}</li>
                <li><span class="info-label">邮箱：</span>{{ user.email }}</li>
                <li><span class="info-label">手机：</span>{{ user.phone }}</li>
                <li><span class="info-label">余额：</span>{{ user.balance }}</li>
            </ul>
        </div>

        <div class="recharge-section">
            <h3>充值</h3>
            <form method="post" action="/recharge" class="recharge-form">
                <input type="hidden" name="user_id" value="{{ user.id }}">
                <div class="form-group">
                    <label for="amount">充值金额</label>
                    <input type="number" id="amount" name="amount" class="form-input" placeholder="请输入金额" step="0.01" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">充值</button>
            </form>
        </div>
    </div>
{% else %}
    <div class="card">
        <h2>用户不存在</h2>
        <p>请检查 user_id 参数是否正确。</p>
        <a href="/" class="btn btn-primary">返回首页</a>
    </div>
{% endif %}
{% endblock %}
